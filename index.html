<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mermaid Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.9.1/mermaid.min.js"></script>
<style>
  :root{
    --bg:#0e1014; --editor-bg:#15181e; --editor-line:#1c2028;
    --ink:#e6e8ec; --muted:#8a909c; --canvas:#fbfbf8; --canvas-ink:#1a1d24;
    --accent:#ff6b4a; --accent-dim:rgba(255,107,74,.15);
    --ok:#37d39b; --err:#ff5a5f; --border:#23262e;
    --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
    --sans:'Inter',system-ui,-apple-system,sans-serif;
    --display:'Space Grotesk',var(--sans);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);overflow:hidden}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  button:focus-visible,select:focus-visible,textarea:focus-visible{outline:2px solid var(--accent);outline-offset:1px}

  .app{display:flex;flex-direction:column;height:100vh}

  /* ---- top bar ---- */
  .topbar{display:flex;align-items:center;gap:16px;padding:0 16px;height:54px;
    background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
  .brand{display:flex;align-items:center;gap:10px;user-select:none}
  .brand svg{display:block}
  .brand .name{font-family:var(--display);font-weight:600;letter-spacing:.14em;
    font-size:13px;text-transform:uppercase}
  .brand .name b{color:var(--accent);font-weight:600}
  .status{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);
    font-family:var(--mono);padding-left:14px;border-left:1px solid var(--border)}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--ok);
    box-shadow:0 0 0 0 var(--ok);transition:background .2s}
  .dot.err{background:var(--err)}
  .dot.pulse{animation:pulse .5s ease-out}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(55,211,155,.5)}100%{box-shadow:0 0 0 7px rgba(55,211,155,0)}}
  .spacer{flex:1}
  .actions{display:flex;align-items:center;gap:6px}
  .btn{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:500;
    padding:7px 12px;border-radius:7px;color:var(--muted);transition:.15s}
  .btn:hover{color:var(--ink);background:#ffffff0d}
  .btn.primary{color:#fff;background:var(--accent)}
  .btn.primary:hover{background:#ff7d60}
  .btn.primary.no-auth{background:var(--border);color:var(--muted);cursor:default}
  .btn.primary.no-auth:hover{background:#2e323d;color:var(--muted)}
  .btn svg{width:14px;height:14px}
  .auth-avatar{width:20px;height:20px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1.5px solid rgba(255,255,255,.2)}
  .project-box{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);
    font-family:var(--mono);padding:3px 8px 3px 10px;border:1px solid var(--border);border-radius:7px;
    max-width:260px;overflow:hidden;white-space:nowrap}
  .project-box span{overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
  .project-box span.untitled{color:#6b7280;font-style:italic}
  .project-del{display:grid;place-items:center;width:18px;height:18px;flex-shrink:0;
    border-radius:4px;color:var(--muted);transition:.12s}
  .project-del:hover{color:var(--err);background:rgba(255,90,95,.12)}
  .project-del svg{width:12px;height:12px}

  /* ---- workspace split ---- */
  .work{flex:1;display:flex;min-height:0}

  /* editor pane (drafting console) */
  .editor-pane{width:42%;min-width:280px;display:flex;flex-direction:column;
    background:var(--editor-bg);border-right:1px solid var(--border)}
  .editor-head{display:flex;flex-direction:column;gap:0;padding:0 14px;
    border-bottom:1px solid var(--editor-line);flex-shrink:0}
  .eh-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:7px 0}
  .eh-row+.eh-row{border-top:1px solid var(--editor-line)}
  .editor-head label{font-size:11px;color:var(--muted);text-transform:uppercase;
    letter-spacing:.1em;font-family:var(--mono)}
  .editor-head select{max-width:150px}
  .headbtn{width:28px;height:27px;display:grid;place-items:center;border-radius:6px;
    color:var(--muted);border:1px solid var(--border);background:#1f232c;transition:.12s}
  .headbtn:hover{color:var(--err);border-color:#5a2a2e;background:#2a181a}
  .headbtn svg{width:14px;height:14px}
  .txtbtn{height:27px;padding:0 11px;border-radius:6px;border:1px solid var(--border);
    background:#1f232c;color:var(--muted);font-size:11.5px;font-family:var(--sans);
    display:inline-flex;align-items:center;gap:6px;cursor:pointer;transition:.12s}
  .txtbtn:hover{color:var(--ink);border-color:#3a4150;background:#262b35}
  .txtbtn svg{width:13px;height:13px}
  select{font-family:var(--sans);font-size:12.5px;background:#1f232c;color:var(--ink);
    border:1px solid var(--border);border-radius:6px;padding:5px 8px;cursor:pointer}
  select optgroup{background:#1f232c;color:var(--accent);font-weight:600;font-style:normal}
  select option{background:#1f232c;color:var(--ink);font-weight:400}
  .editor-wrap{flex:1;display:flex;min-height:0;position:relative;font-family:var(--mono);
    font-size:13.5px;line-height:1.65}
  .gutter{padding:14px 10px 14px 14px;text-align:right;color:#4a505c;background:var(--editor-bg);
    white-space:pre;overflow:hidden;user-select:none;border-right:1px solid var(--editor-line)}
  #editor{flex:1;resize:none;border:none;background:transparent;color:var(--ink);
    padding:14px 16px;white-space:pre;overflow:auto;tab-size:2;
    font-family:inherit;font-size:inherit;line-height:inherit;caret-color:var(--accent)}
  #editor::placeholder{color:#4a505c}

  .errbar{flex-shrink:0;display:none;gap:9px;align-items:flex-start;padding:10px 14px;
    background:#2a181a;border-top:1px solid #43232a;color:#ffb0ac;
    font-family:var(--mono);font-size:12px;line-height:1.5;max-height:120px;overflow:auto}
  .errbar.show{display:flex}
  .errbar svg{width:14px;height:14px;flex-shrink:0;margin-top:1px;color:var(--err)}

  /* canvas pane (paper) */
  .canvas-pane{flex:1;display:flex;flex-direction:column;background:var(--canvas);min-width:0}
  .canvas-head{display:flex;align-items:center;gap:8px;padding:8px 12px;
    border-bottom:1px solid #ececdf;flex-shrink:0;background:var(--canvas);color:#5b6068}
  .canvas-head .grp{display:flex;align-items:center;gap:2px;background:#fff;
    border:1px solid #e6e6db;border-radius:8px;padding:2px}
  .iconbtn{width:30px;height:28px;display:grid;place-items:center;border-radius:6px;
    color:#6b7280;transition:.12s}
  .iconbtn:hover{background:#f0f0e8;color:#1a1d24}
  .iconbtn svg{width:15px;height:15px}
  .zoomval{font-family:var(--mono);font-size:11.5px;color:#9096a0;min-width:42px;text-align:center}
  .canvas-head .ch-label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;
    font-family:var(--mono);color:#a8aca0}
  .toggle{display:flex;align-items:center;gap:6px;font-size:12px;color:#6b7280;cursor:pointer;user-select:none}
  .toggle input{accent-color:var(--accent)}

  .viewport{flex:1;position:relative;overflow:hidden;cursor:grab;
    background-color:var(--canvas);
    background-image:radial-gradient(circle,rgba(20,25,35,.07) 1px,transparent 1px);
    background-size:22px 22px}
  .viewport.grabbing{cursor:grabbing}
  #stage{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
  #stage svg{display:block;max-width:none!important;height:auto}
  .empty{position:absolute;inset:0;display:grid;place-items:center;color:#b5b9af;
    font-size:13px;pointer-events:none}

  .dropdown{position:relative}
  .dd-menu{position:absolute;top:calc(100% + 6px);right:0;background:#1a1d24;
    border:1px solid var(--border);border-radius:9px;padding:4px;min-width:110px;
    box-shadow:0 8px 28px rgba(0,0,0,.4);z-index:200;display:none;flex-direction:column}
  .dd-menu.open{display:flex}
  .dd-item{display:flex;align-items:center;gap:8px;padding:7px 13px;border-radius:6px;
    font-size:12px;color:var(--muted);font-family:var(--sans);width:100%;text-align:left;
    transition:.12s;cursor:pointer}
  .dd-item:hover{color:var(--ink);background:#ffffff0d}
  .dd-chevron{width:11px;height:11px;margin-left:1px;flex-shrink:0;opacity:.6}
  .dd-sep{height:1px;background:var(--border);margin:4px 0}
  .dd-toggle{display:flex;align-items:center;gap:8px;padding:7px 13px;border-radius:6px;
    font-size:12px;color:var(--muted);cursor:pointer;transition:.12s;user-select:none}
  .dd-toggle:hover{color:var(--ink);background:#ffffff0d}
  .dd-toggle input{accent-color:var(--accent);flex-shrink:0}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);
    background:#1a1d24;color:#fff;padding:10px 18px;border-radius:9px;font-size:13px;
    box-shadow:0 8px 30px rgba(0,0,0,.3);opacity:0;transition:.25s;pointer-events:none;z-index:50}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* view-only (read-only) mode */
  .vo-badge{display:none;align-items:center;font-size:10.5px;font-family:var(--mono);
    color:var(--accent);border:1px solid var(--accent);border-radius:999px;
    padding:3px 9px;text-transform:uppercase;letter-spacing:.12em}

  body.view-only .editor-pane{display:none}
  body.view-only #saveBtn,
  body.view-only #linkBtn{display:none}

  body.view-only .vo-badge{display:inline-flex}
  body.view-only #projectDel{display:none!important}

  /* ---- save modal ---- */
  .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);display:grid;
    place-items:center;z-index:500;opacity:0;pointer-events:none;transition:.18s;backdrop-filter:blur(3px)}
  .modal-backdrop.open{opacity:1;pointer-events:auto}
  .modal{background:#1a1d24;border:1px solid var(--border);border-radius:14px;
    padding:24px 26px 20px;width:380px;max-width:calc(100vw - 32px);
    box-shadow:0 24px 64px rgba(0,0,0,.55);
    transform:translateY(12px) scale(.98);transition:.18s}
  .modal-backdrop.open .modal{transform:translateY(0) scale(1)}
  .modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
  .modal-title{font-size:14px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:8px}
  .modal-title svg{color:var(--accent)}
  .modal-close{display:grid;place-items:center;width:26px;height:26px;border-radius:6px;
    color:var(--muted);transition:.12s}
  .modal-close:hover{color:var(--ink);background:#ffffff0d}
  .mfield{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
  .mfield-label{font-size:10.5px;font-weight:500;color:var(--muted);text-transform:uppercase;
    letter-spacing:.1em;font-family:var(--mono);display:flex;align-items:center;gap:5px}
  .mfield-label .opt{font-size:10px;color:#4a505c;text-transform:none;letter-spacing:0;
    font-weight:400;font-family:var(--sans)}
  .mfield input{background:#0e1014;border:1px solid var(--border);border-radius:8px;
    padding:9px 12px;font-size:13px;color:var(--ink);font-family:var(--sans);
    transition:.15s;width:100%}
  .mfield input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
  .mfield input::placeholder{color:#3a3f4c}
  .mfield-hint{font-size:11px;color:#4a505c;font-family:var(--mono);margin-top:-8px}
  .modal-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;
    padding-top:16px;border-top:1px solid var(--border)}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
  .mfield input.shake{animation:shake .35s ease;border-color:var(--err)}

  /* ---- file explorer ---- */
  .exp-modal{width:460px;max-height:80vh;display:flex;flex-direction:column;padding-bottom:0}
  .exp-body{flex:1;overflow-y:auto;margin:0 -26px;padding:4px 10px 12px;
    scrollbar-width:thin;scrollbar-color:var(--border) transparent}
  .exp-folder{margin-bottom:1px}
  .exp-folder-head{display:flex;align-items:center;gap:8px;padding:8px 10px;
    border-radius:8px;cursor:pointer;user-select:none;transition:.12s}
  .exp-folder-head:hover{background:#ffffff0d}
  .exp-chevron{width:13px;height:13px;flex-shrink:0;color:var(--muted);transition:transform .15s}
  .exp-folder-head.open .exp-chevron{transform:rotate(90deg)}
  .exp-fi{width:15px;height:15px;flex-shrink:0}
  .exp-folder-icon{color:#d4a744}
  .exp-file-icon{color:var(--muted)}
  .exp-folder-name{font-size:13px;color:var(--ink);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .exp-folder-count{font-size:11px;color:var(--muted);font-family:var(--mono);flex-shrink:0}
  .exp-folder-files{padding-left:33px;padding-bottom:4px}
  .exp-file{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;
    cursor:pointer;transition:.12s;position:relative}
  .exp-file:hover{background:#ffffff0d}
  .exp-file-name{font-size:13px;color:var(--ink);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .exp-file-date{font-size:11px;color:#4a505c;font-family:var(--mono);flex-shrink:0}
  .exp-file-del{display:none;place-items:center;width:22px;height:22px;flex-shrink:0;
    border-radius:5px;color:var(--muted);transition:.12s;margin-left:2px}
  .exp-file:hover .exp-file-del{display:grid}
  .exp-file-del:hover{color:var(--err);background:rgba(255,90,95,.12)}
  .exp-file-del svg{width:12px;height:12px}
  .exp-sep{height:1px;background:var(--border);margin:8px 10px}
  .exp-loading{padding:10px 10px;font-size:12px;color:var(--muted);font-family:var(--mono)}
  .exp-empty{padding:48px 20px;text-align:center;font-size:13px;color:var(--muted);line-height:1.7}

  @media (max-width:980px){ .actions .label{display:none} }
  @media (max-width:760px){
    .work{flex-direction:column}
    .editor-pane{width:100%;height:46%;min-width:0;border-right:none;border-bottom:1px solid var(--border)}
    .canvas-pane{flex:1}
    .actions .label{display:none}
    .status{display:none}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="app">
  <!-- top bar -->
  <header class="topbar">
    <div class="brand">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M2 16c2.5 0 2.5-4 5-4s2.5 4 5 4 2.5-4 5-4 2.5 4 5 4" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"/>
        <path d="M2 10c2.5 0 2.5-4 5-4s2.5 4 5 4 2.5-4 5-4 2.5 4 5 4" stroke="#566" stroke-width="2" stroke-linecap="round" opacity=".5"/>
      </svg>
      <span class="name">Mermaid<b>Studio</b></span>
    </div>
    <span class="vo-badge" id="voBadge">閲覧専用</span>
    <div class="project-box" id="projectBox">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13" style="flex-shrink:0"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
      <span id="projectName" class="untitled">無題</span>
      <button class="project-del" id="projectDel" title="このプロジェクトを削除" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
      </button>
    </div>
    <div class="spacer"></div>
    <div class="status"><span class="dot" id="dot"></span><span id="statusText">準備完了</span></div>
    <div class="actions">
      <button class="btn" id="authBtn" style="display:none" title="ログイン">
        <img class="auth-avatar" id="authAvatar" style="display:none" alt="">
        <svg id="authGoogleIcon" viewBox="0 0 24 24" width="16" height="16" style="flex-shrink:0"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        <span class="label">ログイン</span>
      </button>
      <button class="btn" id="linkBtn" title="図だけを表示する読み取り専用URLをコピー">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.07 0l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.07 0l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        <span class="label">リンクをコピー</span>
      </button>
      <!-- コピー ドロップダウン -->
      <div class="dropdown" id="copyDd">
        <button class="btn" id="copyDdBtn" title="クリップボードにコピー">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>
          <span class="label">コピー</span>
          <svg class="dd-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div class="dd-menu" id="copyDdMenu">
          <button class="dd-item" id="copySvgItem">SVG</button>
          <button class="dd-item" id="copyPngItem">PNG</button>
          <button class="dd-item" id="copyJpgItem">JPG</button>
        </div>
      </div>
      <!-- エクスポート ドロップダウン -->
      <div class="dropdown" id="exportDd">
        <button class="btn" id="exportDdBtn" title="ファイルに書き出す">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v13"/></svg>
          <span class="label">エクスポート</span>
          <svg class="dd-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div class="dd-menu" id="exportDdMenu">
          <button class="dd-item" id="exportSvgItem">SVG</button>
          <button class="dd-item" id="exportPngItem">PNG</button>
          <button class="dd-item" id="exportJpgItem">JPG</button>
          <div class="dd-sep"></div>
          <label class="dd-toggle">
            <input type="checkbox" id="bgWhite" checked>
            背景を白にする
          </label>
        </div>
      </div>
      <button class="btn primary no-auth" id="saveBtn" title="保存にはログインが必要です">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        <span class="label">保存</span>
      </button>
    </div>
  </header>

  <div class="work">
    <!-- editor -->
    <section class="editor-pane">
      <div class="editor-head">
        <!-- 1行目: 新規作成 / 保存済み / 保存 -->
        <div class="eh-row">
          <button class="txtbtn" id="newBtn" title="新規作成（現在の内容を破棄）">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M12 11v6M9 14h6"/></svg>
            新規作成
          </button>

<script>
const templates = {

  "ER図": `erDiagram

  ORDER ||--|{ LINE_ITEM : contains
  CUSTOMER {

  }`,
  "ガントチャート": `gantt

  dateFormat YYYY-MM-DD
  section 設計
  要件定義       :a1, 2026-01-01, 7d
  基本設計       :a2, after a1, 10d
  section 開発
  実装           :b1, after a2, 20d
  テスト         :b2, after b1, 10d`,
  "円グラフ": `pie title 利用シェア
  "Chrome" : 64
  "Safari" : 19
  "Edge" : 8
  "その他" : 9`,
  "マインドマップ": `mindmap
  root((企画))
    リサーチ
      市場調査
      競合分析
    設計
      UI
      UX
    開発
      フロント
      バックエンド`,
  "ユーザージャーニー": `journey
  title 購入までの体験
  section 発見
    広告を見る: 3: ユーザー
    サイト訪問: 4: ユーザー
  section 検討
    比較する: 3: ユーザー
    レビュー確認: 5: ユーザー
  section 購入
    カート追加: 5: ユーザー
    決済完了: 4: ユーザー`,
  "Gitグラフ": `gitGraph
  commit
  branch develop
  commit
  commit
  checkout main
  merge develop
  commit`

const editor = document.getElementById('editor');
const gutter = document.getElementById('gutter');
const stage = document.getElementById('stage');
const viewport = document.getElementById('viewport');
const empty = document.getElementById('empty');
const dot = document.getElementById('dot');
const statusText = document.getElementById('statusText');
const errbar = document.getElementById('errbar');
const errText = document.getElementById('errText');
const tplSel = document.getElementById('tpl');
const zoomVal = document.getElementById('zoomVal');
const toast = document.getElementById('toast');
const projectBox = document.getElementById('projectBox');
const projectName = document.getElementById('projectName');
const projectDel = document.getElementById('projectDel');

let currentProjectId=null, currentProjectType=null, currentOwnerUid=null, currentProjectFolder='';

function updateProjectDelBtn(){
  const isOwner = currentOwnerUid && fbUser && fbUser.uid===currentOwnerUid;
  projectDel.style.display = isOwner ? 'grid' : 'none';
}
// opts: { id, type:'saved'|'shared', ownerUid, folder }
function setProject(name, opts){
  opts=opts||{};
  currentProjectId=opts.id||null;
  currentProjectType=opts.type||null;
  currentOwnerUid=opts.ownerUid||null;
  currentProjectFolder=opts.folder!==undefined?opts.folder:'';
  if(name){
    projectName.textContent=name; projectName.className='';
    updateProjectDelBtn();
  }else{
    projectName.textContent='無題'; projectName.className='untitled';
    projectDel.style.display='none';
  }
}
projectDel.addEventListener('click',async()=>{
  if(!currentProjectId||!currentProjectType||!fb||!fbUser) return;
  const label=projectName.textContent;
  try{if(!window.confirm(`「${label}」を削除しますか？`)) return;}catch(e){}
  try{
    const {doc,deleteDoc}=fb.fsMod;
    if(currentProjectType==='saved'){
      const folderSnap=currentProjectFolder;
      await deleteDoc(doc(fb.db,'users',fbUser.uid,'diagrams',currentProjectId));
      updateFolderMeta(folderSnap,-1);
    }
    editor.value=''; tplSel.value='';
    updateGutter(); resetView();
    stage.innerHTML=''; empty.style.display='grid';
    hideError(); statusText.textContent='準備完了';
    setProject(null);
    showToast('削除しました');
  }catch(e){
    showToast('削除に失敗：'+(e.code||e.message));
    console.error('projectDel:',e);
  }
});

let renderId = 0;
let currentSvg = null;

// populate templates
const ph=document.createElement('option'); ph.value=''; ph.textContent='（テンプレートを選択）'; tplSel.appendChild(ph);
Object.keys(templates).forEach(k=>{
  const o=document.createElement('option'); o.value=k; o.textContent=k; tplSel.appendChild(o);
});

mermaid.initialize({startOnLoad:false, theme:'default', securityLevel:'loose',
  flowchart:{htmlLabels:true,curve:'basis'}, fontFamily:'Inter, system-ui, sans-serif'});

// ---- gutter ----
function updateGutter(){
  const n = editor.value.split('\n').length;
  let s=''; for(let i=1;i<=n;i++) s+=i+'\n';
  gutter.textContent = s.trimEnd() || '1';
  gutter.scrollTop = editor.scrollTop;
}
editor.addEventListener('scroll',()=>gutter.scrollTop=editor.scrollTop);

// tab inserts two spaces
editor.addEventListener('keydown',e=>{
  if(e.key==='Tab'){
    e.preventDefault();
    const s=editor.selectionStart, en=editor.selectionEnd;
    editor.value=editor.value.slice(0,s)+'  '+editor.value.slice(en);
    editor.selectionStart=editor.selectionEnd=s+2;
    onInput();
  }
});

function setStatus(state){
  if(state==='ok'){dot.className='dot pulse';statusText.textContent='描画完了';
    setTimeout(()=>dot.className='dot',500);}
  else if(state==='error'){dot.className='dot err';statusText.textContent='構文エラー';}
}
function showError(msg){
  errText.textContent = msg.split('\n').slice(0,4).join('\n');
  errbar.classList.add('show');
}
function hideError(){errbar.classList.remove('show');}

async function render(){
  const code = editor.value.trim();
  if(!code){stage.innerHTML='';empty.style.display='grid';hideError();statusText.textContent='準備完了';return;}
  empty.style.display='none';
  const id = 'mmd'+(renderId++);
  try{
    const {svg} = await mermaid.render(id, code);
    stage.innerHTML = svg;
    currentSvg = stage.querySelector('svg');
    // record the diagram's intrinsic size so we can resize (not bitmap-stretch) when zooming
    const vb = currentSvg.viewBox.baseVal;
    baseW = (vb && vb.width) ? vb.width : currentSvg.getBoundingClientRect().width;
    baseH = (vb && vb.height) ? vb.height : currentSvg.getBoundingClientRect().height;
    currentSvg.style.maxWidth = 'none';
    applyTransform();
    setStatus('ok');
    hideError();
  }catch(err){
    // remove any stray node mermaid may have appended
    document.getElementById(id)?.remove();
    document.getElementById('d'+id)?.remove();
    setStatus('error');
    showError((err && err.message) ? err.message : String(err));
  }
}

let debounce;
function onInput(){
  updateGutter();
  clearTimeout(debounce);
  debounce=setTimeout(render,250);
}
editor.addEventListener('input',onInput);

// ---- templates ----
function loadTemplate(name){
  editor.value = templates[name];
  updateGutter();
  resetView();
  render().then(fit);
  setProject(name);
}
tplSel.addEventListener('change',e=>{ if(e.target.value) loadTemplate(e.target.value); });

// ---- pan & zoom ----
let scale=1, tx=0, ty=0, baseW=0, baseH=0;
function applyTransform(){
  // translate moves the diagram (sharp); scaling is done by resizing the SVG itself,
  // so it is re-rendered as vectors at the new size instead of being stretched as a bitmap.
  stage.style.transform=`translate(${tx}px,${ty}px)`;
  if(currentSvg && baseW && baseH){
    currentSvg.style.width=(baseW*scale)+'px';
    currentSvg.style.height=(baseH*scale)+'px';
  }
  zoomVal.textContent=Math.round(scale*100)+'%';
}
function resetView(){scale=1;tx=0;ty=0;applyTransform();}
function fit(){
  if(!currentSvg) return;
  const vw=viewport.clientWidth, vh=viewport.clientHeight;
  const w=baseW||currentSvg.viewBox.baseVal.width;
  const h=baseH||currentSvg.viewBox.baseVal.height;
  if(!w||!h) return;
  scale=Math.min(vw/w, vh/h)*0.9;
  scale=Math.min(scale,2);
  tx=(vw-w*scale)/2; ty=(vh-h*scale)/2;
  applyTransform();
}
document.getElementById('fitBtn').addEventListener('click',fit);
document.getElementById('zoomIn').addEventListener('click',()=>{scale=Math.min(scale*1.2,12);applyTransform();});
document.getElementById('zoomOut').addEventListener('click',()=>{scale=Math.max(scale/1.2,0.1);applyTransform();});

viewport.addEventListener('wheel',e=>{
  e.preventDefault();
  const rect=viewport.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const factor=e.deltaY<0?1.12:1/1.12;
  const ns=Math.min(Math.max(scale*factor,0.1),12);
  tx=mx-(mx-tx)*(ns/scale); ty=my-(my-ty)*(ns/scale);
  scale=ns; applyTransform();
},{passive:false});

let dragging=false,sx,sy;
viewport.addEventListener('pointerdown',e=>{dragging=true;sx=e.clientX-tx;sy=e.clientY-ty;
  viewport.classList.add('grabbing');viewport.setPointerCapture(e.pointerId);});
viewport.addEventListener('pointermove',e=>{if(!dragging)return;tx=e.clientX-sx;ty=e.clientY-sy;applyTransform();});
viewport.addEventListener('pointerup',()=>{dragging=false;viewport.classList.remove('grabbing');});

// ---- export ----
function showToast(msg){toast.textContent=msg;toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),1800);}

function serializedSvg(){
  if(!currentSvg) return null;
  const clone=currentSvg.cloneNode(true);
  clone.setAttribute('xmlns','http://www.w3.org/2000/svg');
  clone.setAttribute('xmlns:xlink','http://www.w3.org/1999/xlink');
  const w=currentSvg.viewBox.baseVal.width||baseW||currentSvg.getBoundingClientRect().width;
  const h=currentSvg.viewBox.baseVal.height||baseH||currentSvg.getBoundingClientRect().height;
  // strip the on-screen zoom sizing so exports come out at the diagram's true size
  clone.style.width=''; clone.style.height=''; clone.style.maxWidth='none';
  clone.setAttribute('width',w); clone.setAttribute('height',h);
  return {str:new XMLSerializer().serializeToString(clone), w, h};
}
function download(blob,name){
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;
  a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
function stamp(){return new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');}

// ---- export / copy helpers ----
function renderToBlob(mime, quality){
  return new Promise((resolve,reject)=>{
    const s=serializedSvg(); if(!s){reject(new Error('no svg'));return;}
    const scaleF=2;
    const bgWhite=document.getElementById('bgWhite').checked;
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');
      c.width=s.w*scaleF; c.height=s.h*scaleF;
      const ctx=c.getContext('2d');
      if(bgWhite||mime==='image/jpeg'){ctx.fillStyle='#ffffff';ctx.fillRect(0,0,c.width,c.height);}
      ctx.setTransform(scaleF,0,0,scaleF,0,0);
      ctx.drawImage(img,0,0);
      c.toBlob(b=>b?resolve(b):reject(new Error('toBlob失敗')), mime, quality);
    };
    img.onerror=()=>reject(new Error('SVG読み込み失敗'));
    img.src='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(s.str);
  });
}
// export (download)
function doExportSvg(){
  const s=serializedSvg(); if(!s){showToast('まず図を描画してください');return;}
  download(new Blob([s.str],{type:'image/svg+xml'}),`diagram-${stamp()}.svg`);
  showToast('SVGを保存しました');
}
async function doExportRaster(mime,ext,label){
  try{
    showToast(`${label}を変換中…`);
    const b=await renderToBlob(mime,0.95);
    download(b,`diagram-${stamp()}.${ext}`);
    showToast(`${label}を保存しました`);
  }catch(e){showToast(`${label}の保存に失敗しました`);}
}
// copy
async function doCopySvg(){
  const s=serializedSvg(); if(!s){showToast('まず図を描画してください');return;}
  try{await navigator.clipboard.writeText(s.str);showToast('SVGコードをコピーしました');}
  catch{showToast('コピーに失敗しました');}
}
async function doCopyRaster(mime,label){
  if(!serializedSvg()){showToast('まず図を描画してください');return;}
  try{
    const b=await renderToBlob('image/png',1); // clipboard は PNG のみ広くサポート
    await navigator.clipboard.write([new ClipboardItem({'image/png':b})]);
    showToast(`${label}をクリップボードにコピーしました`);
  }catch(e){showToast('クリップボードへの書き込みに失敗しました（ブラウザ非対応の可能性）');}
}
// dropdown toggle
function makeDropdown(btnId, menuId){

    e.stopPropagation();

// ---- share via URL ----
function decodeCode(s){
  let b64=s.replace(/-/g,'+').replace(/_/g,'/');
  while(b64.length%4) b64+='=';
  return decodeURIComponent(escape(atob(b64)));
}
// Read an initial diagram from the URL. Supported forms:
//   ?code=<生のMermaid記法>   … 手書き向け（URLエンコード済み）
//   ?c=<base64>  または  #code=<base64> / #c=<base64>  … 共有リンク向け
function getInitialCode(){
  try{
    const q=new URLSearchParams(location.search);
    if(q.get('code')) return q.get('code');           // URLSearchParams が自動デコード
    const h=new URLSearchParams(location.hash.replace(/^#/,''));
    const enc=q.get('c')||h.get('c')||h.get('code');
    if(enc) return decodeCode(enc);
  }catch(e){ console.warn('URLの初期値を読み取れませんでした',e); }
  return '';
}
// generic param reader (looks in both query string and hash)
function getParam(name){
  try{
    const q=new URLSearchParams(location.search);
    if(q.has(name)) return q.get(name);
    const h=new URLSearchParams(location.hash.replace(/^#/,''));
    if(h.has(name)) return h.get(name);
  }catch(e){}
  return null;
}
function isViewOnly(){
  const v=getParam('view');
  return v==='1'||v==='true'||v==='';   // ?view / ?view=1 / ?view=true
}
async function copyLink(url,msg){
  try{await navigator.clipboard.writeText(url);showToast(msg);}
  catch{ window.prompt('このURLをコピーしてください',url); }
}
document.getElementById('linkBtn').addEventListener('click',async()=>{
  if(!USE_FIREBASE||!fb){showToast('Firebaseが初期化されていません');return;}
  if(!fbUser){showToast('リンク作成にはログインが必要です');fbSignIn();return;}
  if(!currentProjectId||currentProjectType!=='saved'){
    showToast('先にプロジェクトを保存してください'); return;
  }
  const url=location.origin+location.pathname
    +'?uid='+encodeURIComponent(fbUser.uid)
    +'&id='+encodeURIComponent(currentProjectId)
    +'&view=1';

// ---- save to Firestore ----
// ユーザーごとに users/{uid}/diagrams/{docId} に保存する。
// Firebase 未初期化・未ログイン時はドロップダウンに案内を表示するだけで壊れない。
function defaultName(){
  const first=(editor.value.trim().split('\n')[0]||'図').replace(/\s+/g,' ').slice(0,28);
  return first||'無題の図';
}
function parsePath(path){
  const segs=(path||'').split('/').map(s=>s.trim()).filter(Boolean);
  if(!segs.length) return {folder:'', name:defaultName()};
  const name=segs.pop();
  return {folder:segs.join('/'), name};
}

let explorerCache={};
function refreshSaved(){ explorerCache={}; }

// ---- folder meta (users/{uid}/meta/index) ----
async function updateFolderMeta(folder, delta){
  if(!fb||!fbUser) return;
  explorerCache={};
  const key=folder||'__root__';
  const {doc,getDoc,setDoc}=fb.fsMod;
  const ref=doc(fb.db,'users',fbUser.uid,'meta','index');
  try{
    const snap=await getDoc(ref);
    const folders={...((snap.exists()?snap.data().folders:null)||{})};
    const next=(folders[key]||0)+delta;
    if(next<=0) delete folders[key]; else folders[key]=next;
    await setDoc(ref,{folders});
  }catch(e){ console.error('updateFolderMeta:',e); }
}
async function rebuildMetaIndex(){
  if(!fb||!fbUser) return {};
  const {collection,getDocs,doc,setDoc}=fb.fsMod;
  const snap=await getDocs(collection(fb.db,'users',fbUser.uid,'diagrams'));
  const folders={};
  snap.docs.forEach(d=>{ const k=d.data().folder||'__root__'; folders[k]=(folders[k]||0)+1; });
  if(Object.keys(folders).length) await setDoc(doc(fb.db,'users',fbUser.uid,'meta','index'),{folders});
  return folders;
}

// ---- file explorer ----
async function openExplorer(){
  if(!USE_FIREBASE||!fb){showToast('Firebaseが初期化されていません');return;}
  if(!fbUser){showToast('ログインが必要です');fbSignIn();return;}
  const modal=document.getElementById('explorerModal');
  const body=document.getElementById('explorerBody');
  modal.classList.add('open');
  body.innerHTML='<div class="exp-loading">読み込み中…</div>';
  try{
    const {doc,getDoc}=fb.fsMod;
    const snap=await getDoc(doc(fb.db,'users',fbUser.uid,'meta','index'));
    let folders=snap.exists()?(snap.data().folders||{}):{};
    // meta/indexが空 or 未作成なら既存diagrams全件から再構築
    if(!Object.keys(folders).some(k=>(folders[k]||0)>0)){
      folders=await rebuildMetaIndex();
    }
    renderExplorer(body,folders);
  }catch(e){
    // セキュリティルールでmeta読み込みが拒否された場合もdiagrams直読みで代替
    console.warn('meta/index read failed, falling back:',e.code,e.message);
    try{
      const folders=await rebuildMetaIndex();
      renderExplorer(body,folders);
    }catch(e2){
      body.innerHTML=`<div class="exp-empty">読み込みに失敗しました<br><span style="font-size:11px;color:#4a505c">${e.code||e.message}</span></div>`;
      console.error('openExplorer fallback failed:',e2);
    }
  }
}
function closeExplorer(){
  document.getElementById('explorerModal').classList.remove('open');
}
document.getElementById('explorerClose').addEventListener('click',closeExplorer);
document.getElementById('explorerCancel').addEventListener('click',closeExplorer);
document.getElementById('explorerModal').addEventListener('click',e=>{
  if(e.target===document.getElementById('explorerModal')) closeExplorer();
});

function renderExplorer(body,folders){
  const keys=Object.keys(folders)
    .filter(k=>(folders[k]||0)>0)
    .sort((a,b)=>{
      if(a==='__root__') return -1; if(b==='__root__') return 1;
      return a.localeCompare(b,'ja');
    });
  if(!keys.length){
    body.innerHTML='<div class="exp-empty">保存済みのプロジェクトがありません。<br>「保存」ボタンで図を保存してみましょう。</div>';
    return;
  }
  body.innerHTML='';
  keys.forEach(k=>{
    const name=k==='__root__'?'未分類':k;
    body.appendChild(buildFolderEl(k,name,folders[k]||0));
  });
}

function buildFolderEl(key,displayName,count){
  const div=document.createElement('div');
  div.className='exp-folder';
  div.innerHTML=`
    <div class="exp-folder-head">
      <svg class="exp-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
      <svg class="exp-fi exp-folder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      <span class="exp-folder-name">${displayName}</span>
      <span class="exp-folder-count">${count}件</span>
    </div>
    <div class="exp-folder-files" style="display:none"></div>`;
  const head=div.querySelector('.exp-folder-head');
  const files=div.querySelector('.exp-folder-files');
  head.addEventListener('click',()=>toggleExpFolder(head,key,files));
  return div;
}

async function toggleExpFolder(head,key,filesEl){
  const isOpen=head.classList.contains('open');
  if(isOpen){ head.classList.remove('open'); filesEl.style.display='none'; return; }
  head.classList.add('open'); filesEl.style.display='block';
  if(explorerCache[key]){ renderExpFiles(filesEl,explorerCache[key],key); return; }
  filesEl.innerHTML='<div class="exp-loading">読み込み中…</div>';
  try{
    const {collection,query,where,getDocs}=fb.fsMod;
    const folderVal=key==='__root__'?'':key;
    const snap=await getDocs(query(
      collection(fb.db,'users',fbUser.uid,'diagrams'),
      where('folder','==',folderVal)
    ));
    const items=snap.docs
      .map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>(b.ts?.seconds||0)-(a.ts?.seconds||0));
    explorerCache[key]=items;
    renderExpFiles(filesEl,items,key);
  }catch(e){
    filesEl.innerHTML=`<div class="exp-loading">読み込みに失敗しました (${e.code||e.message})</div>`;
    console.error('toggleExpFolder:',e);
  }
}

function renderExpFiles(filesEl,items,folderKey){
  if(!items.length){ filesEl.innerHTML='<div class="exp-loading">（空のフォルダ）</div>'; return; }
  filesEl.innerHTML='';
  items.forEach(it=>{
    const dateStr=it.ts?.toDate
      ?it.ts.toDate().toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'}):'';
    const el=document.createElement('div');
    el.className='exp-file';
    el.innerHTML=`
      <svg class="exp-fi exp-file-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
      <span class="exp-file-name">${it.name}</span>
      <span class="exp-file-date">${dateStr}</span>
      <button class="exp-file-del" title="削除" data-id="${it.id}" data-folder="${it.folder||''}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
      </button>`;
    el.addEventListener('click',e=>{
      if(e.target.closest('.exp-file-del')) return;
      closeExplorer(); loadSaved(it.id);
    });
    el.querySelector('.exp-file-del').addEventListener('click',async e=>{
      e.stopPropagation();
      const btn=e.currentTarget;
      await deleteSaved(btn.dataset.id, btn.dataset.folder);
      delete explorerCache[folderKey];
      // refresh folder
      const filesElParent=btn.closest('.exp-folder-files');
      const head=filesElParent?.previousElementSibling;
      if(head?.classList.contains('open')){
        await toggleExpFolder(head,folderKey,filesElParent);
        await toggleExpFolder(head,folderKey,filesElParent);
      }
    });
    filesEl.appendChild(el);
  });
}

function openSaveModal(){
  return new Promise(resolve=>{
    const backdrop=document.getElementById('saveModal');
    const nameEl=document.getElementById('saveModalName');
    const folderEl=document.getElementById('saveModalFolder');
    const okBtn=document.getElementById('saveModalOk');
    const cancelBtn=document.getElementById('saveModalCancel');
    const closeBtn=document.getElementById('saveModalClose');
    nameEl.value=defaultName(); folderEl.value='';
    backdrop.classList.add('open');
    requestAnimationFrame(()=>{ nameEl.focus(); nameEl.select(); });
    function done(result){
      backdrop.classList.remove('open');
      okBtn.removeEventListener('click',onOk);
      cancelBtn.removeEventListener('click',onCancel);
      closeBtn.removeEventListener('click',onCancel);
      backdrop.removeEventListener('click',onBd);
      nameEl.removeEventListener('keydown',onKey);
      folderEl.removeEventListener('keydown',onKey);
      resolve(result);
    }
    function onOk(){
      const n=(nameEl.value||'').trim();
      if(!n){nameEl.focus();nameEl.classList.add('shake');setTimeout(()=>nameEl.classList.remove('shake'),400);return;}
      done({name:n, folder:(folderEl.value||'').trim()});
    }
    function onCancel(){ done(null); }
    function onBd(e){ if(e.target===backdrop) onCancel(); }
    function onKey(e){ if(e.key==='Enter') onOk(); else if(e.key==='Escape') onCancel(); }
    okBtn.addEventListener('click',onOk);
    cancelBtn.addEventListener('click',onCancel);
    closeBtn.addEventListener('click',onCancel);
    backdrop.addEventListener('click',onBd);
    nameEl.addEventListener('keydown',onKey);
    folderEl.addEventListener('keydown',onKey);
  });
}
async function saveCurrent(){
  if(!editor.value.trim()){showToast('まず図を入力してください');return;}
  if(!USE_FIREBASE||!fb){showToast('Firebaseが初期化されていません');return;}
  if(!fbUser){showToast('保存にはログインが必要です');fbSignIn();return;}
  const result=await openSaveModal();
  if(!result) return;
  const {name,folder}=result;
  try{
    const {collection,addDoc,serverTimestamp}=fb.fsMod;
    const ref=await addDoc(collection(fb.db,'users',fbUser.uid,'diagrams'),
      {name,folder,code:editor.value,ts:serverTimestamp()});
    await updateFolderMeta(folder,1);
    setProject((folder?folder+' / ':'')+name, {id:ref.id, type:'saved', ownerUid:fbUser.uid, folder});
    showToast('保存しました');
  }catch(e){
    showToast('保存に失敗しました：'+(e.code||e.message));
    console.error('saveCurrent:',e);
  }
}

async function loadSaved(id){
  if(!fb||!fbUser){showToast('ログインが必要です');return;}

async function deleteSaved(id, folderHint){
  if(!fb||!fbUser) return;
  try{
    const {doc,getDoc,deleteDoc}=fb.fsMod;
    let folderVal=folderHint!==undefined?folderHint:null;
    if(folderVal===null){
      const snap=await getDoc(doc(fb.db,'users',fbUser.uid,'diagrams',id));
      const it=snap.exists()?snap.data():{};
      folderVal=it.folder||'';
    }
    try{if(!window.confirm('削除しますか？')) return;}catch(e){}
    await deleteDoc(doc(fb.db,'users',fbUser.uid,'diagrams',id));
    await updateFolderMeta(folderVal,-1);
    if(currentProjectId===id) setProject(null);
    showToast('削除しました');
  }catch(e){
    showToast('削除に失敗：'+(e.code||e.message));
    console.error('deleteSaved:',e);
  }
}

// ---- load Mermaid diagrams from a local .md file ----
const mdBtn=document.getElementById('mdBtn');
const mdFile=document.getElementById('mdFile');
const mdNav=document.getElementById('mdNav');
const mdLabel=document.getElementById('mdLabel');
let mdBlocks=[], mdIndex=0, mdFileName='';

function extractMermaid(md){
  const blocks=[]; const re=/```[ \t]*mermaid[^\n]*\n([\s\S]*?)```/gi; let m;
  while((m=re.exec(md))!==null){ const code=m[1].replace(/\s+$/,''); if(code.trim()) blocks.push(code); }
  return blocks;
}
function updateMdNav(){
  if(mdBlocks.length>1){ mdNav.style.display='flex'; mdLabel.textContent=`図 ${mdIndex+1}/${mdBlocks.length}`; }
  else{ mdNav.style.display='none'; }
}
function showMdBlock(i){
  if(!mdBlocks.length) return;
  mdIndex=(i+mdBlocks.length)%mdBlocks.length;
  editor.value=mdBlocks[mdIndex];
  tplSel.value='';
  updateGutter(); resetView(); render().then(fit);
  updateMdNav();
  setProject(mdBlocks.length>1 ? `${mdFileName}  (${mdIndex+1}/${mdBlocks.length})` : mdFileName);
}
mdBtn.addEventListener('click',()=>mdFile.click());
mdFile.addEventListener('change',()=>{
  const file=mdFile.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const blocks=extractMermaid(ev.target.result);
    if(!blocks.length){ showToast('mdの中にMermaid記法が見つかりませんでした'); return; }
    mdFileName=file.name; mdBlocks=blocks; showMdBlock(0);
    showToast(`「${file.name}」からMermaid図を${blocks.length}件読み込みました`);
  };
  reader.onerror=()=>showToast('ファイルの読み込みに失敗しました');
  reader.readAsText(file,'UTF-8');
  mdFile.value=''; // 同じファイルを再選択できるようリセット
});
document.getElementById('mdPrev').addEventListener('click',()=>showMdBlock(mdIndex-1));
document.getElementById('mdNext').addEventListener('click',()=>showMdBlock(mdIndex+1));

function isAllowedUser(user){

  return user.email.endsWith('@'+ALLOWED_DOMAIN) && user.emailVerified;

const authBtn=document.getElementById('authBtn');
let fb=null, fbUser=null, pendingShared=null;

async function loadShared(uid, id){
  if(!fb){ pendingShared={uid,id}; return; }
  if(!fbUser){
    // 未ログイン — pendingSharedを保持したままログインを促す
    pendingShared={uid,id};
    showSharedLoginPrompt();
    return;
  }
  if(!isAllowedUser(fbUser)){
    showSharedError(
      'このリンクを閲覧するには @'+ALLOWED_DOMAIN+' のアカウントが必要です',
      fbUser.email||'unknown'
    );
    return;
  }
  try{
    const {doc,getDoc}=fb.fsMod;
    const snap=await getDoc(doc(fb.db,'users',uid,'diagrams',id));
    if(!snap.exists()){ showSharedError('プロジェクトが見つかりません','not-found'); return; }
    const sd=snap.data();
    editor.value=sd.code||'';
    updateGutter(); resetView(); render().then(fit);
    const label=(sd.folder?sd.folder+' / ':'')+sd.name;
    setProject(label, {id, type:'shared', ownerUid:uid, folder:sd.folder||''});
    showToast('読み込みました');
  }catch(e){
    const msg=e.code==='permission-denied'
      ? 'このプロジェクトを閲覧する権限がありません'
      : '読み込みに失敗しました：'+(e.code||e.message);
    showSharedError(msg, e.code||'error');
    console.error('loadShared:',e);

async function initFirebase(){
  if(!USE_FIREBASE){ updateAuthUI(); return; }
  try{
    // 必要なときだけ動的に読み込む（未設定でもアプリ本体は壊れない）
    const appMod  = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    const authMod = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
    const fsMod   = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const app  = appMod.initializeApp(firebaseConfig);
    const auth = authMod.getAuth(app);
    const db   = fsMod.getFirestore(app);
    fb = { auth, db, authMod, fsMod, provider:new authMod.GoogleAuthProvider() };
    authMod.onAuthStateChanged(auth, u=>{
      fbUser=u; updateAuthUI();
      refreshSaved('');
      if(fbUser&&pendingShared){const ps=pendingShared;pendingShared=null;loadShared(ps.uid,ps.id);}
      else if(!fbUser&&pendingShared) showSharedLoginPrompt();
    });
  }catch(e){ console.error(e); showToast('Firebaseの初期化に失敗しました'); }
}
